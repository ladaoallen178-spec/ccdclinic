services:
  - type: web
    name: schoolclinic-backend
    env: docker
    plan: free
    dockerfilePath: Dockerfile
    branch: main
    region: oregon
    buildCommand: ""
    startCommand: ""
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: RUST_LOG
        value: "info"

# Notes:
# - This manifest is a starting point. For production, add your DATABASE_URL and other secrets
#   using the Render dashboard's Secrets/Environment settings rather than committing them to git.
# - Render will set the `PORT` environment variable at runtime; the backend reads `PORT`.
