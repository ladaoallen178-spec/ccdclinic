services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: myengine
    ports:
      - "5433:5432"
    volumes:
      - myengine_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d myengine"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: myengine
      DATABASE_URL: postgres://postgres:postgres@db:5432/myengine
      PORT: 8000
      SUPABASE_URL: http://localhost:5173
      CLIENT_URL: http://localhost:5173
    ports:
      - "8000:8000"

volumes:
  myengine_db_data:
